{% extends 'olivier/base.html' %}

{% block title %}Reset Password - MUNYABUGINGO{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-card" style="padding: 2.5rem; border-radius: 24px; text-align: center;">
        <div style="width: 64px; height: 64px; background: rgba(129, 140, 248, 0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg style="width: 32px; height: 32px; color: #818cf8;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"></path>
            </svg>
        </div>
        
        <h2 style="margin-bottom: 0.5rem;">Forgot Password?</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Enter your email address below and we'll send you a link to reset your password.</p>
        
        <form method="POST">
            {% csrf_token %}
            <div style="margin-bottom: 1.5rem; text-align: left;">
                <label for="id_email" style="display: block; margin-bottom: 0.5rem; font-size: 0.9rem; color: var(--text-muted);">Email Address</label>
                <input type="email" name="email" id="id_email" class="form-control" placeholder="name@company.com" required style="width: 100%;">
            </div>
            
            <button type="submit" class="btn" style="width: 100%; padding: 0.8rem;">Send Reset Link</button>
        </form>
        
        <div style="margin-top: 1.5rem;">
            <a href="{% url 'Munyabugingo:login' %}" style="color: #818cf8; text-decoration: none; font-size: 0.9rem;">Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
