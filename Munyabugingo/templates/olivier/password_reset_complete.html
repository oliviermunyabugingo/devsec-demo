{% extends 'olivier/base.html' %}

{% block title %}Reset Complete - MUNYABUGINGO{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="glass-card" style="padding: 2.5rem; border-radius: 24px; text-align: center;">
        <div style="width: 64px; height: 64px; background: rgba(34, 197, 94, 0.2); border-radius: 16px; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
            <svg style="width: 32px; height: 32px; color: #22c55e;" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
            </svg>
        </div>
        
        <h2 style="margin-bottom: 0.5rem;">Password Reset!</h2>
        <p style="color: var(--text-muted); margin-bottom: 2rem;">Your password has been successfully reset. You can now log in using your new credentials.</p>
        
        <a href="{% url 'Munyabugingo:login' %}" class="btn" style="width: 100%;">Sign In Now</a>
    </div>
</div>
{% endblock %}
